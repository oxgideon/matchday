<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MATCHDAY — Predict. Pick. Win.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0d14;
    --bg2: #10141d;
    --card: rgba(255,255,255,0.04);
    --card-border: rgba(242,169,59,0.18);
    --gold: #f2a93b;
    --gold-light: #ffce7a;
    --crimson: #e2384d;
    --crimson-glow: rgba(226,56,77,0.3);
    --text: #f5f2ea;
    --muted: #8b93a3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }

  .headline { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

  /* ─── NAVBAR ─────────────────────────────────────────── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: rgba(10,13,20,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(242,169,59,0.12);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo { display: flex; align-items: center; gap: 6px; }
  .nav-brand {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .nav-brand span { color: var(--gold); }

  .nav-right { display: flex; align-items: center; gap: 8px; }

  .balance-glass {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px;
    padding-left: 14px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    height: 36px;
    box-sizing: border-box;
  }
  .nav-balance { font-size: 14px; font-weight: 800; color: var(--text); white-space: nowrap; }
  .nav-add-btn {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; border: none; cursor: pointer;
    background: var(--gold); color: var(--bg);
  }
  .nav-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--crimson));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--bg);
  }

  /* ─── HERO ───────────────────────────────────────────── */
  .hero {
    margin: 16px;
    padding: 22px 20px;
    border-radius: 20px;
    background: linear-gradient(135deg, #1a1f2e, #241a12);
    border: 1px solid rgba(242,169,59,0.25);
    position: relative;
    overflow: hidden;
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
    color: var(--crimson); text-transform: uppercase;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .hero-eyebrow .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--crimson);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .hero-title { font-size: 30px; font-weight: 700; line-height: 1.1; margin-bottom: 16px; }
  .hero-title span { color: var(--gold); }
  .hero-stats { display: flex; gap: 24px; }
  .hero-stat-num { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); }
  .hero-stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ─── FILTER TABS ────────────────────────────────────── */
  .filter-bar {
    display: flex; gap: 8px; padding: 4px 16px 14px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: var(--muted);
    font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
  }
  .filter-chip.active {
    background: linear-gradient(180deg, rgba(242,169,59,0.18), rgba(242,169,59,0.06));
    border-color: rgba(242,169,59,0.5);
    color: var(--gold);
  }

  /* ─── SECTION ────────────────────────────────────────── */
  .section-title {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 12px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .section-title .see-all { font-size: 11px; color: var(--gold); font-weight: 600; text-transform: none; letter-spacing: 0; }

  /* ─── MATCH CARDS (glass) ────────────────────────────── */
  .match-list { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

  .match-card {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 16px;
    backdrop-filter: blur(16px) saturate(150%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 6px 18px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  .match-card:active { transform: scale(0.98); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase; padding: 4px 9px; border-radius: 20px;
    margin-bottom: 10px;
  }
  .badge-upcoming { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.14); }
  .badge-live {
    position: absolute; top: 12px; right: 12px; margin: 0;
    width: 30px; height: 30px; padding: 0; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(226,56,77,0.5);
    display: flex; align-items: center; justify-content: center;
  }
  .live-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--crimson); animation: pulse 1.5s infinite; }

  .teams-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .team-side { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .team-crest {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden;
  }
  .team-crest img { width: 100%; height: 100%; object-fit: cover; }
  .team-name { font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: center; }

  .center-col { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 0 10px; }
  .score-display { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; color: var(--gold); }
  .vs-text { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--muted); }
  .match-meta { font-size: 10px; color: var(--muted); font-weight: 600; }

  .odds-row {
    display: flex; gap: 6px;
    background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 4px;
  }
  .odds-btn {
    flex: 1; padding: 9px 4px; border-radius: 9px; border: none;
    background: transparent; color: var(--text);
    font-size: 11px; font-weight: 700; text-align: center; cursor: pointer;
    display: flex; flex-direction: column; gap: 2px;
  }
  .odds-btn:active, .odds-btn.selected { background: rgba(242,169,59,0.16); color: var(--gold); }
  .odds-label { font-size: 9px; color: var(--muted); font-weight: 700; }
  .odds-val { font-size: 13px; font-weight: 800; }

  .empty-state { text-align: center; padding: 30px 16px; color: var(--muted); font-size: 13px; }

  /* ─── TAB BAR ────────────────────────────────────────── */
  .tab-bar {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    width: calc(100% - 28px); max-width: 420px;
    background: rgba(16,20,29,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    display: flex; padding: 8px; gap: 4px; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .tab-btn {
    flex: 1; padding: 12px; border: none; background: transparent;
    color: var(--muted); font-size: 11px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 6px; border-radius: 18px; transition: all 0.25s ease;
  }
  .tab-btn .tab-icon { font-size: 20px; }
  .tab-btn .tab-label { display: none; }
  .tab-btn.active {
    flex: 1.6; color: var(--gold);
    background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(242,169,59,0.06));
    border: 1px solid rgba(255,255,255,0.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 10px rgba(242,169,59,0.15);
  }
  .tab-btn.active .tab-label { display: inline; }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(20,20,20,0.95); border: 1px solid rgba(242,169,59,0.3);
    padding: 12px 20px; border-radius: 14px; font-size: 13px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
      <div class="nav-brand">Match<span>Day</span></div>
    </div>
    <div class="nav-right">
      <div class="balance-glass">
        <span class="nav-balance" id="nav-balance">$ —</span>
        <button class="nav-add-btn"><i class="fas fa-plus"></i></button>
      </div>
      <div class="nav-avatar" id="nav-avatar">M</div>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow"><span class="dot"></span> World Cup 2026</div>
    <div class="hero-title">Every <span>Matchday</span><br>is a market</div>
    <div class="hero-stats">
      <div><div class="hero-stat-num" id="stat-matches">—</div><div class="hero-stat-label">Matches</div></div>
      <div><div class="hero-stat-num" id="stat-live">—</div><div class="hero-stat-label">Live Now</div></div>
      <div><div class="hero-stat-num" id="stat-upcoming">—</div><div class="hero-stat-label">Upcoming</div></div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="live">Live</button>
    <button class="filter-chip" data-filter="upcoming">Upcoming</button>
    <button class="filter-chip" data-filter="completed">Completed</button>
  </div>

  <div class="section-title"><span>Matches</span></div>
  <div class="match-list" id="match-list">
    <div class="empty-state">Loading matches…</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active"><span class="tab-icon"><i class="fas fa-house"></i></span><span class="tab-label">Home</span></button>
    <button class="tab-btn"><span class="tab-icon"><i class="fas fa-futbol"></i></span><span class="tab-label">Matches</span></button>
    <button class="tab-btn"><span class="tab-icon"><i class="fas fa-ticket"></i></span><span class="tab-label">My Picks</span></button>
    <button class="tab-btn"><span class="tab-icon"><i class="fas fa-user"></i></span><span class="tab-label">Profile</span></button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import {
      getAuth, signInAnonymously, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import {
      getFirestore, collection, doc, onSnapshot, setDoc, getDoc, query, orderBy
    } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // ─── Firebase config (public — safe to expose in frontend) ───────────
    const firebaseConfig = {
      apiKey: "AIzaSyBxK8aEmaTNUGU69sVD7W-RA_C8NH76yjw",
      authDomain: "matchday-b9acd.firebaseapp.com",
      projectId: "matchday-b9acd",
      storageBucket: "matchday-b9acd.firebasestorage.app",
      messagingSenderId: "760230866396",
      appId: "1:760230866396:web:69b1b4664a72d629377319"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let matches = [];
    let activeFilter = 'all';

    // ─── AUTH: anonymous sign-in so people can jump straight in ──────────
    signInAnonymously(auth).catch(err => console.error("Auth error:", err));

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      currentUser = user;
      document.getElementById('nav-avatar').textContent = 'M';

      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        await setDoc(userRef, { balance: 1000, createdAt: Date.now() });
      }

      onSnapshot(userRef, (docSnap) => {
        const data = docSnap.data();
        if (data) {
          document.getElementById('nav-balance').textContent = `$ ${data.balance.toLocaleString()}`;
        }
      });
    });

    // ─── FIRESTORE: live sync of "markets" collection (same shape as GoalLine) ──
    const marketsQuery = query(collection(db, "markets"), orderBy("createdAt", "desc"));
    onSnapshot(marketsQuery, (snap) => {
      matches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderMatches();
    }, (err) => {
      console.error("Markets sync error:", err);
      document.getElementById('match-list').innerHTML =
        `<div class="empty-state">Couldn't load matches. Check server.js is running and writing to Firestore.</div>`;
    });

    function updateStats() {
      document.getElementById('stat-matches').textContent = matches.length;
      document.getElementById('stat-live').textContent = matches.filter(m => m.status === 'live').length;
      document.getElementById('stat-upcoming').textContent = matches.filter(m => m.status === 'upcoming').length;
    }

    function oddsDisplay(v) {
      return (v === null || v === undefined || isNaN(v)) ? 'Soon' : v + 'x';
    }

    function statusBadge(m) {
      if (m.status === 'live') return `<div class="status-badge badge-live"><div class="live-dot"></div></div>`;
      if (m.status === 'upcoming') return `<div class="status-badge badge-upcoming"><i class="fas fa-calendar"></i> ${m.time || ''}</div>`;
      return `<div class="status-badge badge-upcoming"><i class="fas fa-check"></i> Final</div>`;
    }

    function matchCardHTML(m) {
      const center = (m.status === 'live' || m.status === 'completed')
        ? `<div class="score-display">${m.score || '0:0'}</div><div class="match-meta">${m.status === 'live' ? (m.time || 'LIVE') : 'FT'}</div>`
        : `<div class="vs-text">VS</div><div class="match-meta">${m.time || ''}</div>`;

      const oddsDisabled = m.status === 'completed';

      return `
        <div class="match-card" data-id="${m.id}">
          ${statusBadge(m)}
          <div class="teams-row">
            <div class="team-side">
              <div class="team-crest">${m.homeFlag || '🏳️'}</div>
              <div class="team-name">${m.home || 'TBD'}</div>
            </div>
            <div class="center-col">${center}</div>
            <div class="team-side">
              <div class="team-crest">${m.awayFlag || '🏳️'}</div>
              <div class="team-name">${m.away || 'TBD'}</div>
            </div>
          </div>
          ${!oddsDisabled ? `
          <div class="odds-row">
            <div class="odds-btn" onclick="window.placePick('${m.id}','home')"><div class="odds-label">1 WIN</div><div class="odds-val">${oddsDisplay(m.oddsHome)}</div></div>
            <div class="odds-btn" onclick="window.placePick('${m.id}','draw')"><div class="odds-label">DRAW</div><div class="odds-val">${oddsDisplay(m.oddsDraw)}</div></div>
            <div class="odds-btn" onclick="window.placePick('${m.id}','away')"><div class="odds-label">2 WIN</div><div class="odds-val">${oddsDisplay(m.oddsAway)}</div></div>
          </div>` : `<div style="text-align:center;font-size:12px;color:var(--muted);font-weight:600;">Market closed · Final: ${m.score || ''}</div>`}
        </div>`;
    }

    function renderMatches() {
      const list = document.getElementById('match-list');
      const filtered = activeFilter === 'all' ? matches : matches.filter(m => m.status === activeFilter);

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state">No ${activeFilter === 'all' ? '' : activeFilter} matches right now.</div>`;
        return;
      }
      list.innerHTML = filtered.map(matchCardHTML).join('');
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderMatches();
      });
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // ─── PLACEHOLDER pick handler — full betting logic comes in a later step ──
    window.placePick = function(matchId, pick) {
      if (navigator.vibrate) navigator.vibrate(15);
      showToast(`Picked ${pick.toUpperCase()} — betting flow coming in the next build step!`);
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }
  </script>
</body>
</html>
